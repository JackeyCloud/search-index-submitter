name: Build desktop apps

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-15-intel
            platform: macos
            artifact: SearchIndexSubmitter-macOS-Intel
            archive: SearchIndexSubmitter-macOS-Intel.zip
          - name: macOS Apple Silicon
            runner: macos-15
            platform: macos
            artifact: SearchIndexSubmitter-macOS-Apple-Silicon
            archive: SearchIndexSubmitter-macOS-Apple-Silicon.zip
          - name: Windows x64
            runner: windows-2022
            platform: windows
            artifact: SearchIndexSubmitter-Windows-x64
            archive: SearchIndexSubmitter-Windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --upgrade pip setuptools wheel pyinstaller pytest .

      - name: Run tests
        run: python -m pytest -q

      - name: Build macOS application
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name SearchIndexSubmitter \
            --icon assets/app-icon.icns \
            --paths src \
            --collect-all googleapiclient \
            --collect-all google_auth_oauthlib \
            --collect-all google.oauth2 \
            run.py
          xattr -cr dist/SearchIndexSubmitter.app
          codesign --force --deep --sign - dist/SearchIndexSubmitter.app
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent \
            dist/SearchIndexSubmitter.app \
            "release/${{ matrix.archive }}"

      - name: Verify macOS architecture
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          file dist/SearchIndexSubmitter.app/Contents/MacOS/SearchIndexSubmitter
          test -s "release/${{ matrix.archive }}"
          codesign --verify --deep --strict dist/SearchIndexSubmitter.app

      - name: Build Windows application
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name SearchIndexSubmitter `
            --icon assets/app-icon.ico `
            --paths src `
            --collect-all googleapiclient `
            --collect-all google_auth_oauthlib `
            --collect-all google.oauth2 `
            run.py
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path dist\SearchIndexSubmitter.exe `
            -DestinationPath "release\${{ matrix.archive }}" `
            -Force

      - name: Verify Windows executable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          if (-not (Test-Path dist\SearchIndexSubmitter.exe)) { throw "EXE not found" }
          if ((Get-Item dist\SearchIndexSubmitter.exe).Length -lt 1MB) { throw "EXE is unexpectedly small" }
          if (-not (Test-Path "release\${{ matrix.archive }}")) { throw "Archive not found" }

      - name: Upload packaged application
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 30
